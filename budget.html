            <div class="rec-meta">${FREQ_LABELS[r.freq]||r.freq} · le ${r.day} · ${c.l}</div>
          </div>
          <div class="rec-right">
            <div class="rec-amt ${r.type==='expense'?'exp':'inc'}">${r.type==='expense'?'-':'+'}${fmtAmt(r.amount)} ${cur}</div>
            <div style="display:flex;gap:6px;align-items:center" onclick="event.stopPropagation()">
              <div class="rec-next">le ${r.day}</div>
              <label style="position:relative;width:36px;height:20px;flex-shrink:0">
                <input type="checkbox" ${r.active?'checked':''} onchange="toggleRecurring(${i},this.checked)" style="opacity:0;position:absolute;inset:0">
                <div style="position:absolute;inset:0;border-radius:10px;background:${r.active?'var(--accent)':'var(--surface2)'};transition:.2s"></div>
                <div style="position:absolute;top:2px;left:${r.active?'18':'2'}px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)"></div>
              </label>
              <span style="font-size:16px;color:var(--t3)">›</span>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>` : '<div class="empty">Aucune récurrence.<br>Ajoute ton loyer, tes abonnements...</div>'}
  </div>`;

  // Update settings count
  const rc = document.getElementById('recCount');
  if(rc) rc.textContent = data.recurring.length + ' récurrence(s) active(s)';
}

let recType = 'expense';
function setRecType(t){
  recType = t;
  document.getElementById('rec-btn-exp').classList.toggle('active', t==='expense');
  document.getElementById('rec-btn-inc').classList.toggle('active', t==='income');
  const sel = document.getElementById('rec-cat');
  if(sel) sel.innerHTML = CATS[t].map(c=>`<option value="${c.id}">${c.e} ${c.l}</option>`).join('');
}

function addRecurring(){
  const desc = document.getElementById('rec-desc').value.trim();
  const amount = parseFloat(document.getElementById('rec-amount').value);
  const day = parseInt(document.getElementById('rec-day').value);
  const cat = document.getElementById('rec-cat').value;
  if(!desc){toast('💡 Entre une description');return}
  if(!amount||amount<=0){toast('💡 Entre un montant');return}
  if(!data.recurring) data.recurring=[];
  data.recurring.push({id:Date.now(), type:recType, desc, amount, day, cat, freq:'monthly', active:true});
  save();
  document.getElementById('rec-desc').value='';
  document.getElementById('rec-amount').value='';
  toast('✅ Récurrence ajoutée !');
  renderRecurring();
}

function toggleRecurring(i, val){
  data.recurring[i].active = val;
  save();
  toast(val ? '▶️ Activée' : '⏸ Désactivée');
  renderRecurring();
}

function deleteRecurring(i){
  openModal('Supprimer cette récurrence','',()=>{
    data.recurring.splice(i,1);save();renderRecurring();toast('🗑 Supprimée');
  });
}

/* ── CODE PIN ── */
let pinBuffer = '';
let pinMode = 'unlock'; // unlock | setup1 | setup2
let pinTemp = '';
let pinResolve = null;

function initPinScreen(){
  const hasPhoto = prefs.avatarPhoto;
  const emoji = prefs.avatarEmoji || '💰';
  const av = document.getElementById('pinAvatar');
  if(av) av.innerHTML = hasPhoto ? `<img src="${prefs.avatarPhoto}" style="width:100%;height:100%;object-fit:cover;border-radius:24px">` : emoji;
  const pt = document.getElementById('pinTitle');
  if(pt) pt.textContent = prefs.appName || 'Mon Budget';
}

function showPinScreen(mode='unlock'){
  pinMode = mode;
  pinBuffer = '';
  pinTemp = '';
  initPinScreen();
  updatePinDots();
  const sub = document.getElementById('pinSubtitle');
  const hint = document.getElementById('pinHint');
  const err = document.getElementById('pinError');
  if(err) err.textContent = '';
  if(mode === 'unlock'){
    if(sub) sub.textContent = 'Entrer le code';
    if(hint) hint.textContent = '';
    // Show Face ID button if available
    const fb = document.getElementById('pinFaceBtn');
    if(fb){fb.style.opacity='1';fb.textContent='🫥';}
    tryFaceID();
  } else if(mode === 'setup1'){
    if(sub) sub.textContent = 'Nouveau code PIN';
    if(hint) hint.textContent = 'Choisissez un code à 4 chiffres pour protéger vos données.';
    const fb = document.getElementById('pinFaceBtn');
    if(fb) fb.style.opacity='0';
  } else if(mode === 'setup2'){
    if(sub) sub.textContent = 'Confirmer le code';
    if(hint) hint.textContent = '';
  }
  document.getElementById('pinScreen').classList.add('show');
}

function hidePinScreen(){
  document.getElementById('pinScreen').classList.remove('show');
}

function updatePinDots(){
  for(let i=0;i<4;i++){
    const d = document.getElementById('pd'+i);
    if(d){
      d.classList.toggle('filled', i < pinBuffer.length);
      d.classList.remove('error');
    }
  }
}

function pinShakeError(msg){
  for(let i=0;i<4;i++){
    const d = document.getElementById('pd'+i);
    if(d){ d.classList.remove('filled'); void d.offsetWidth; d.classList.add('error'); }
  }
  const err = document.getElementById('pinError');
  if(err) err.textContent = msg;
  setTimeout(()=>{ pinBuffer=''; updatePinDots(); }, 600);
}

function pinKey(k){
  if(pinBuffer.length >= 4) return;
  pinBuffer += k;
  updatePinDots();
  if(pinBuffer.length === 4){
    setTimeout(()=>handlePinComplete(), 150);
  }
}

function pinDel(){
  if(pinBuffer.length > 0){
    pinBuffer = pinBuffer.slice(0,-1);
    updatePinDots();
  }
}

function handlePinComplete(){
  const stored = localStorage.getItem('budget_pin');
  if(pinMode === 'unlock'){
    if(pinBuffer === stored){
      hidePinScreen();
      pinBuffer = '';
      updatePinDots();
    } else {
      pinShakeError('Code incorrect');
    }
  } else if(pinMode === 'setup1'){
    pinTemp = pinBuffer;
    pinBuffer = '';
    updatePinDots();
    showPinScreen('setup2');
  } else if(pinMode === 'setup2'){
    if(pinBuffer === pinTemp){
      localStorage.setItem('budget_pin', pinBuffer);
      prefs.pinEnabled = true;
      savePrefs();
      hidePinScreen();
      toast('🔒 Code PIN activé !');
      renderSettings();
    } else {
      pinShakeError('Les codes ne correspondent pas');
      pinTemp = '';
      setTimeout(()=>showPinScreen('setup1'), 800);
    }
  }
}

function openPinSetup(){
  if(prefs.pinEnabled){
    openModal('Code PIN', 'Désactiver ou modifier le code PIN ?', ()=>{
      // Disable
      localStorage.removeItem('budget_pin');
      prefs.pinEnabled = false;
      savePrefs();
      toast('🔓 Code PIN désactivé');
      renderSettings();
    });
    // Add modify option - just show setup after modal cancel
  } else {
    showPinScreen('setup1');
  }
}

function tryFaceID(){
  if(!window.PublicKeyCredential) return;
  // Try biometric if supported — gracefully falls back to PIN
  const fb = document.getElementById('pinFaceBtn');
  if(fb) fb.textContent = '⊙';
}

  document.getElementById('editrec-btn-inc').classList.toggle('active', r.type==='income');

  const daySel = document.getElementById('editrec-day');

  const catSel = document.getElementById('editrec-cat');

function setEditRecType(t){
  editRecType = t;
  document.getElementById('editrec-btn-exp').classList.toggle('active', t==='expense');
  document.getElementById('editrec-btn-inc').classList.toggle('active', t==='income');
}

function closeEditRecModal(e){
  if(!e || e.target===document.getElementById('editRecModalBg'))
    document.getElementById('editRecModalBg').classList.remove('show');
}

function saveEditRec(){
  if(editingRecIdx === null) return;
  const desc = document.getElementById('editrec-desc').value.trim();
  const amount = parseFloat(document.getElementById('editrec-amount').value);
  const day = parseInt(document.getElementById('editrec-day').value);
  const cat = document.getElementById('editrec-cat').value;
  if(!desc){toast('💡 Entre une description');return}
  if(!amount||amount<=0){toast('💡 Entre un montant');return}
  data.recurring[editingRecIdx] = {
    ...data.recurring[editingRecIdx],
    type: editRecType, desc, amount, day, cat
  };
  save();
  document.getElementById('editRecModalBg').classList.remove('show');
  renderRecurring();
  toast('✅ Récurrence modifiée !');
  editingRecIdx = null;
}

function deleteEditRec(){
  if(editingRecIdx === null) return;
  openModal('Supprimer cette récurrence','',()=>{
    data.recurring.splice(editingRecIdx, 1);
    save();
    document.getElementById('editRecModalBg').classList.remove('show');
    renderRecurring();
    toast('🗑 Supprimée');
    editingRecIdx = null;
  });
}
