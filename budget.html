const FREQ_LABELS = {monthly:'Mensuel', weekly:'Hebdo', bimonthly:'Bi-mensuel'};

function getNextDate(rec){
  // Find the next date this recurring tx should fire
  const today = new Date().toISOString().split('T')[0];
  const pd = prefs.payDay || 25;
  if(rec.freq === 'monthly'){
    const now = new Date();
    let d = new Date(now.getFullYear(), now.getMonth(), rec.day);
    if(d.toISOString().split('T')[0] < today) d = new Date(now.getFullYear(), now.getMonth()+1, rec.day);
    return d.toISOString().split('T')[0];
  }
  return today;
}


function processEndOfPeriodSavings(){
  if(prefs.autoSavings === false) return;
  if(!data.savings) data.savings = [];

  const today = fmtDate(new Date());
  const pd = prefs.payDay || 25;

  // Get current period start to know what the PREVIOUS period was
  const period = currentPeriod();
  const prevEnd = new Date(period.start);
  prevEnd.setDate(prevEnd.getDate() - 1);
  const prevEndStr = fmtDate(prevEnd);

  // Get previous period start
  const prevStart = new Date(period.start);
  prevStart.setMonth(prevStart.getMonth() - 1);
  // Clamp to last day if needed
  const prevStartStr = fmtDate(new Date(prevStart.getFullYear(), prevStart.getMonth(), clampDay(prevStart.getFullYear(), prevStart.getMonth(), pd)));

  // Check if we already did auto-savings for this period transition
  const alreadyDone = data.savings.some(s => s.autoForPeriod === period.start);
  if(alreadyDone) return;

  // Only run on payday or just after (first 2 days of new period)
  const daysSinceStart = Math.round((new Date(today) - new Date(period.start)) / (1000*60*60*24));
  if(daysSinceStart > 2) return; // Only run in first 2 days of new period

  // Calculate previous period balance
  const prevTx = data.transactions.filter(t => t.date >= prevStartStr && t.date <= prevEndStr);
  if(prevTx.length === 0) return; // No transactions in prev period, skip

  const prevIncome  = prevTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount, 0);
  const prevExpense = prevTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount, 0);
  const leftover = Math.round((prevIncome - prevExpense) * 100) / 100;

  if(leftover <= 0) return; // Nothing to save or negative, skip

  // Add to savings automatically
  data.savings.push({
    id: Date.now(),
    type: 'deposit',
    amount: leftover,
    desc: `Reliquat période ${prevStartStr.slice(8)}/${prevStartStr.slice(5,7)} → ${prevEndStr.slice(8)}/${prevEndStr.slice(5,7)}`,
    date: today,
    autoForPeriod: period.start, // marker so we don't do it twice
    auto: true
  });
  save();

  setTimeout(()=>{
    toast(`💰 ${leftover.toLocaleString('fr-FR')} € transférés en épargne !`);
  }, 2500);
}
function processDueRecurring(){
  if(!data.recurring || data.recurring.length === 0) return;
  const today = new Date().toISOString().split('T')[0];
  const todayDay = new Date().getDate();
  let added = 0;
  data.recurring.forEach(rec => {
    if(!rec.active) return;
    if(rec.freq === 'monthly' && todayDay === rec.day){
      // Check if already added this month
      const monthStr = today.slice(0,7);
      const alreadyAdded = data.transactions.some(t =>
        t.recurringId === rec.id && t.date.startsWith(monthStr)
      );
      if(!alreadyAdded){
        data.transactions.unshift({id:Date.now()+Math.random(),type:rec.type,amount:rec.amount,desc:rec.desc+' (auto)',cat:rec.cat,date:today,recurringId:rec.id});
        added++;
      }
    }
  });
  if(added > 0){
    save();
    toast('🔁 ' + added + ' transaction(s) récurrente(s) ajoutée(s) !');
  }
}

  document.getElementById('rec-amount').value='';
  toast('✅ Récurrence ajoutée !');
  renderRecurring();
}

function toggleRecurring(i, val){

function deleteRecurring(i){

/* ── CODE PIN ── */
let pinBuffer = '';
let pinMode = 'unlock'; // unlock | setup1 | setup2
let pinTemp = '';
let pinResolve = null;

function initPinScreen(){
  const hasPhoto = prefs.avatarPhoto;
  const emoji = prefs.avatarEmoji || '💰';
  const av = document.getElementById('pinAvatar');
  if(av) av.innerHTML = hasPhoto ? '<img src="'+prefs.avatarPhoto+'" style="width:100%;height:100%;object-fit:cover;border-radius:24px">' : emoji;
  const pt = document.getElementById('pinTitle');
  if(pt) pt.textContent = prefs.appName || 'Mon Budget';
}

function showPinScreen(mode='unlock'){
  pinMode = mode;
  pinBuffer = '';
  pinTemp = '';
  initPinScreen();
  updatePinDots();
  const sub = document.getElementById('pinSubtitle');
  const hint = document.getElementById('pinHint');
  const err = document.getElementById('pinError');
  if(err) err.textContent = '';
  if(mode === 'unlock'){
    if(sub) sub.textContent = 'Entrer le code';
    if(hint) hint.textContent = '';
    // Show Face ID button if available
    const fb = document.getElementById('pinFaceBtn');
    if(fb){fb.style.opacity='1';fb.textContent='🫥';}
    tryFaceID();
  } else if(mode === 'setup1'){
    if(sub) sub.textContent = 'Nouveau code PIN';
    if(hint) hint.textContent = 'Choisissez un code à 4 chiffres pour protéger vos données.';
    const fb = document.getElementById('pinFaceBtn');
    if(fb) fb.style.opacity='0';
  } else if(mode === 'setup2'){
    if(sub) sub.textContent = 'Confirmer le code';
    if(hint) hint.textContent = '';
  }
  document.getElementById('pinScreen').classList.add('show');
}

function hidePinScreen(){
  document.getElementById('pinScreen').classList.remove('show');
}

function updatePinDots(){
  for(let i=0;i<4;i++){
    const d = document.getElementById('pd'+i);
    if(d){
      d.classList.toggle('filled', i < pinBuffer.length);
      d.classList.remove('error');
    }
  }
}

function pinShakeError(msg){
  for(let i=0;i<4;i++){
    const d = document.getElementById('pd'+i);
    if(d){ d.classList.remove('filled'); void d.offsetWidth; d.classList.add('error'); }
  }
  const err = document.getElementById('pinError');
  if(err) err.textContent = msg;
  setTimeout(()=>{ pinBuffer=''; updatePinDots(); }, 600);
}

function pinKey(k){
  if(pinBuffer.length >= 4) return;
  pinBuffer += k;
  updatePinDots();
  if(pinBuffer.length === 4){
    setTimeout(()=>handlePinComplete(), 150);
  }
}

function pinDel(){
  if(pinBuffer.length > 0){
    pinBuffer = pinBuffer.slice(0,-1);
    updatePinDots();
  }
}

function handlePinComplete(){
  const stored = localStorage.getItem('budget_pin');
  if(pinMode === 'unlock'){
    if(pinBuffer === stored){
      hidePinScreen();
      pinBuffer = '';
      updatePinDots();
    } else {
      pinShakeError('Code incorrect');
    }
  } else if(pinMode === 'setup1'){
    pinTemp = pinBuffer;
    pinBuffer = '';
    updatePinDots();
    showPinScreen('setup2');
  } else if(pinMode === 'setup2'){
    if(pinBuffer === pinTemp){
      localStorage.setItem('budget_pin', pinBuffer);
      prefs.pinEnabled = true;
      savePrefs();
      hidePinScreen();
      toast('🔒 Code PIN activé !');
      renderSettings();
    } else {
      pinShakeError('Les codes ne correspondent pas');
      pinTemp = '';
      setTimeout(()=>showPinScreen('setup1'), 800);
    }
  }
}

function openPinSetup(){
  if(prefs.pinEnabled){
    openModal('Code PIN', 'Désactiver ou modifier le code PIN ?', ()=>{
      // Disable
      localStorage.removeItem('budget_pin');
      prefs.pinEnabled = false;
      savePrefs();
      toast('🔓 Code PIN désactivé');
      renderSettings();
    });
    // Add modify option - just show setup after modal cancel
  } else {
    showPinScreen('setup1');
  }
}

function tryFaceID(){
  if(!window.PublicKeyCredential) return;
  // Try biometric if supported — gracefully falls back to PIN
  const fb = document.getElementById('pinFaceBtn');
  if(fb) fb.textContent = '⊙';
}

/* ── CALENDRIER ── */
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let calSelectedDay = null;

function renderCalendar(){
  var cur=prefs.currency||'€';
  var today=new Date();
  var todayStr=fmtDate(today);
  var monthStr=calYear+'-'+String(calMonth+1).padStart(2,'0');
  var monthTx=data.transactions.filter(function(t){return t.date.startsWith(monthStr);});
  var dayMap={};
  monthTx.forEach(function(t){
    if(!dayMap[t.date]) dayMap[t.date]={expense:0,income:0,txs:[]};
    if(t.type==='expense') dayMap[t.date].expense+=t.amount;
    else dayMap[t.date].income+=t.amount;
    dayMap[t.date].txs.push(t);
  });
  var totalExp=monthTx.filter(function(t){return t.type==='expense';}).reduce(function(s,t){return s+t.amount;},0);
  var totalInc=monthTx.filter(function(t){return t.type==='income';}).reduce(function(s,t){return s+t.amount;},0);
  var daysWithTx=Object.keys(dayMap).length;
  var maxExpVal=Math.max.apply(null,Object.values(dayMap).map(function(d){return d.expense;}).concat([1]));
  var firstDay=new Date(calYear,calMonth,1).getDay();
  var startOffset=(firstDay+6)%7;
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var monthLabel=new Date(calYear,calMonth,1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  var period=currentPeriod();

  var cells='';
  for(var ei=0;ei<startOffset;ei++) cells+='<div class="cal-day empty"></div>';
  for(var d=1;d<=daysInMonth;d++){
    var dateStr=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dayData=dayMap[dateStr];
    var isToday=dateStr===todayStr;
    var isSel=dateStr===calSelectedDay;
    var inPer=dateStr>=period.start&&dateStr<=period.end;
    var dotColor='transparent';
    var bgStyle='';
    if(dayData){
      if(dayData.expense>0&&dayData.income>0){dotColor='#7b5ea7';}
      else if(dayData.expense>0){dotColor='rgba(255,95,95,1)';bgStyle='background:rgba(255,95,95,'+(0.06+(dayData.expense/maxExpVal)*0.18)+')';}
      else if(dayData.income>0){dotColor='var(--inc-t)';bgStyle='background:rgba(26,158,92,0.1)';}
    }
    cells+='<div class="cal-day'+(isToday?' today':'')+(isSel?' selected':'')+(inPer?' in-period':'')+'" style="'+bgStyle+'" onclick="selectCalDay(\''+dateStr+'\')">';
    cells+='<div class="cal-day-num">'+d+'</div>';
    cells+=dayData?('<div class="cal-dot" style="background:'+dotColor+'"></div>'):'<div style="height:7px"></div>';
    cells+='</div>';
  }

  var detailHtml='';
  if(calSelectedDay){
    var sd=dayMap[calSelectedDay];
    var sdParts=calSelectedDay.split('-');
    var dateLabel=new Date(parseInt(sdParts[0]),parseInt(sdParts[1])-1,parseInt(sdParts[2])).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    if(sd&&sd.txs.length>0){
      detailHtml='<div class="cal-detail"><div class="cal-detail-header"><div class="cal-detail-date">'+dateLabel+'</div>';
      detailHtml+='<div class="cal-detail-total" style="color:'+(sd.expense>0?'var(--exp-t)':'var(--inc-t)')+'">'+( sd.expense>0?('-'+fmtAmt(Math.round(sd.expense))):('+'+fmtAmt(Math.round(sd.income))))+' '+cur+'</div></div>';
      sd.txs.forEach(function(t,i){
        var c=getCat(t.cat);
        if(i>0) detailHtml+='<div class="divider"></div>';
        detailHtml+='<div class="tx-item" onclick="openEditTx('+t.id+')" style="cursor:pointer">';
        detailHtml+='<div class="tx-icon">'+c.e+'</div>';
        detailHtml+='<div class="tx-info"><div class="tx-name">'+t.desc+'</div><div class="tx-meta">'+c.l+'</div></div>';
        detailHtml+='<div class="tx-amt '+(t.type==='expense'?'exp':'inc')+'">'+(t.type==='expense'?'-':'+')+fmtAmt(t.amount)+' '+cur+'</div>';
        detailHtml+='<span style="font-size:16px;color:var(--t3)">›</span></div>';
      });
      detailHtml+='</div>';
    } else {
      detailHtml='<div class="cal-detail" style="padding:24px;text-align:center;color:var(--t3);font-size:14px">'+dateLabel+'<br>Aucune transaction</div>';
    }
  }

  var el=document.getElementById('s-calendar');
  var html='<div class="cal-pad">';
  html+='<div class="cal-nav"><button class="cal-nav-btn" onclick="calMove(-1)">‹</button>';
  html+='<div class="cal-month-label">'+monthLabel+'</div>';
  html+='<button class="cal-nav-btn" onclick="calMove(1)">›</button></div>';
  html+='<div class="cal-summary-cards">';
  html+='<div class="cal-sum-card"><div class="cal-sum-val" style="color:var(--exp-t)">'+fmtAmt(Math.round(totalExp))+' '+cur+'</div><div class="cal-sum-label">Dépenses</div></div>';
  html+='<div class="cal-sum-card"><div class="cal-sum-val" style="color:var(--inc-t)">'+fmtAmt(Math.round(totalInc))+' '+cur+'</div><div class="cal-sum-label">Revenus</div></div>';
  html+='<div class="cal-sum-card"><div class="cal-sum-val">'+daysWithTx+'</div><div class="cal-sum-label">Jours actifs</div></div>';
  html+='</div>';
  html+='<div class="cal-weekdays" style="margin-top:14px">';
  ['L','M','M','J','V','S','D'].forEach(function(wd){html+='<div class="cal-wd">'+wd+'</div>';});
  html+='</div>';
  html+='<div class="cal-grid">'+cells+'</div>';
  html+='<div class="cal-legend">';
  html+='<div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(255,95,95,.8)"></div>Dépense</div>';
  html+='<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--inc-t)"></div>Revenu</div>';
  html+='<div class="cal-legend-item"><div class="cal-legend-dot" style="background:#7b5ea7"></div>Les deux</div>';
  html+='</div>';
  html+=detailHtml;
  html+='</div>';
  el.innerHTML=html;
}

function selectCalDay(dateStr){
  calSelectedDay = calSelectedDay === dateStr ? null : dateStr;
  renderCalendar();
  if(calSelectedDay){
    setTimeout(()=>{
      const det = document.querySelector('.cal-detail');
      if(det) det.scrollIntoView({behavior:'smooth',block:'nearest'});
    },100);
  }
}

function calMove(dir){
  calMonth += dir;
  if(calMonth > 11){calMonth=0;calYear++;}
  if(calMonth < 0){calMonth=11;calYear--;}
  calSelectedDay = null;
  renderCalendar();
}

function updateAppUrl(v){
  prefs.appUrl = v.trim();
  savePrefs();
  const el = document.getElementById('appUrlDisplay');
  if(el) el.textContent = prefs.appUrl || 'Non configuré';

function shareApp(){
  const url = prefs.appUrl || window.location.href;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>{
      toast('🔗 Lien copié !');
    }).catch(()=>fallbackCopy(url));
  } else {
    fallbackCopy(url);
  }
}

function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); toast('🔗 Lien copié !'); }
  catch(e){ toast('❌ Impossible de copier'); }
  document.body.removeChild(ta);
}

function nativeShare(){
  const url = prefs.appUrl || window.location.href;
  const name = prefs.appName || 'Mon Budget';
  if(navigator.share){
    navigator.share({
      title: name,
      text: `Gère ton budget avec ${name} — une appli gratuite !`,
      url: url
    }).catch(()=>{});
  } else {
    shareApp(); // fallback to copy
    toast('🔗 Lien copié (partage natif non dispo)');
  }
}

/* ── STATISTIQUES ── */
let statsYear = new Date().getFullYear();

function renderStats(){
  var cur=prefs.currency||'€';
  var years=[...new Set(data.transactions.map(function(t){return parseInt(t.date.slice(0,4));}))].sort().reverse();
  if(years.indexOf(statsYear)===-1&&years.length) statsYear=years[0];

  var yearTx=data.transactions.filter(function(t){return t.date.startsWith(statsYear+'');});
  var yearExp=yearTx.filter(function(t){return t.type==='expense';}).reduce(function(s,t){return s+t.amount;},0);
  var yearInc=yearTx.filter(function(t){return t.type==='income';}).reduce(function(s,t){return s+t.amount;},0);
  var yearSav=yearInc-yearExp;
  var savRate=yearInc>0?Math.round((yearSav/yearInc)*100):0;

  var prevYearTx=data.transactions.filter(function(t){return t.date.startsWith((statsYear-1)+'');});
  var prevYearExp=prevYearTx.filter(function(t){return t.type==='expense';}).reduce(function(s,t){return s+t.amount;},0);
  var expDiff=prevYearExp>0?Math.round(((yearExp-prevYearExp)/prevYearExp)*100):null;

  var byCat={};
  yearTx.filter(function(t){return t.type==='expense';}).forEach(function(t){byCat[t.cat]=(byCat[t.cat]||0)+t.amount;});
  var topCats=Object.entries(byCat).sort(function(a,b){return b[1]-a[1];}).slice(0,6);
  var maxCat=topCats.length?topCats[0][1]:1;

  var MONTH_NAMES=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  var monthly=[];
  for(var mi=0;mi<12;mi++){
    var ms=statsYear+'-'+String(mi+1).padStart(2,'0');
    var me=yearTx.filter(function(t){return t.date.startsWith(ms)&&t.type==='expense';}).reduce(function(s,t){return s+t.amount;},0);
    var mr=yearTx.filter(function(t){return t.date.startsWith(ms)&&t.type==='income';}).reduce(function(s,t){return s+t.amount;},0);
    monthly.push({month:MONTH_NAMES[mi],exp:me,inc:mr});
  }
  var maxMonthly=Math.max.apply(null,monthly.map(function(m){return Math.max(m.exp,m.inc);}).concat([1]));
  var periodsWithData=monthly.filter(function(m){return m.exp>0||m.inc>0;}).length||1;
  var avgMonthlyExp=Math.round(yearExp/periodsWithData);
  var avgMonthlyInc=Math.round(yearInc/periodsWithData);
  var expMonths=monthly.filter(function(m){return m.exp>0;});
  var bestMonth=expMonths.length?expMonths.reduce(function(a,b){return a.exp<b.exp?a:b;}):null;
  var worstMonth=expMonths.length?expMonths.reduce(function(a,b){return a.exp>b.exp?a:b;}):null;

  var el=document.getElementById('s-stats');
  var html='<div class="stats-pad">';

  // Year toggle
  html+='<div class="stats-year-toggle">';
  if(years.length){
    years.forEach(function(y){
      html+='<div class="stats-year-btn'+(y===statsYear?' active':'')+'" onclick="statsYear='+y+';renderStats()">'+y+'</div>';
    });
  } else {
    html+='<div class="stats-year-btn active">'+statsYear+'</div>';
  }
  html+='</div>';

  // Hero cards
  html+='<div class="stats-hero">';
  html+='<div class="stats-card"><div class="stats-card-label">Dépenses</div><div class="stats-card-val red">'+fmtAmt(Math.round(yearExp))+' '+cur+'</div>';
  html+=expDiff!==null?('<div class="stats-card-sub" style="color:'+(expDiff>0?'var(--exp-t)':'var(--inc-t)')+'">'+( expDiff>0?'▲':'▼')+' '+Math.abs(expDiff)+'% vs '+(statsYear-1)+'</div>'):'<div class="stats-card-sub">Année en cours</div>';
  html+='</div>';
  html+='<div class="stats-card"><div class="stats-card-label">Revenus</div><div class="stats-card-val green">'+fmtAmt(Math.round(yearInc))+' '+cur+'</div><div class="stats-card-sub">Moy. '+fmtAmt(avgMonthlyInc)+' '+cur+'/mois</div></div>';
  html+='<div class="stats-card"><div class="stats-card-label">Épargne nette</div><div class="stats-card-val '+(yearSav>=0?'green':'red')+'">'+(yearSav>=0?'+':'')+fmtAmt(Math.round(yearSav))+' '+cur+'</div><div class="stats-card-sub">Taux '+Math.max(0,savRate)+'%</div></div>';
  html+='<div class="stats-card"><div class="stats-card-label">Moy. dépenses</div><div class="stats-card-val accent">'+fmtAmt(avgMonthlyExp)+' '+cur+'</div><div class="stats-card-sub">par période</div></div>';
  html+='</div>';

  // Best/worst
  if(bestMonth||worstMonth){
    html+='<div class="stats-card full" style="margin-bottom:12px"><div class="stats-card-label">Meilleur &amp; pire mois</div><div style="display:flex;gap:10px;margin-top:6px">';
    if(bestMonth) html+='<div style="flex:1;background:rgba(26,158,92,.08);border-radius:10px;padding:10px 12px"><div style="font-size:11px;color:var(--inc-t);font-weight:600;margin-bottom:2px">🏆 Meilleur</div><div style="font-size:15px;font-weight:500">'+bestMonth.month+'</div><div style="font-size:12px;color:var(--t2)">'+fmtAmt(Math.round(bestMonth.exp))+' '+cur+'</div></div>';
    if(worstMonth) html+='<div style="flex:1;background:rgba(255,95,95,.08);border-radius:10px;padding:10px 12px"><div style="font-size:11px;color:var(--exp-t);font-weight:600;margin-bottom:2px">⚠️ Plus chargé</div><div style="font-size:15px;font-weight:500">'+worstMonth.month+'</div><div style="font-size:12px;color:var(--t2)">'+fmtAmt(Math.round(worstMonth.exp))+' '+cur+'</div></div>';
    html+='</div></div>';
  }

  // Monthly chart
  html+='<div class="sec-label">Évolution mensuelle</div>';
  html+='<div class="stats-card full" style="margin-bottom:12px">';
  html+='<div style="display:flex;gap:8px;margin-bottom:8px">';
  html+='<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--exp-t)"><div style="width:10px;height:10px;border-radius:2px;background:var(--exp-t);opacity:.7"></div>Dépenses</div>';
  html+='<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--inc-t)"><div style="width:10px;height:10px;border-radius:2px;background:var(--inc-t);opacity:.7"></div>Revenus</div>';
  html+='</div><div class="stats-month-chart">';
  monthly.forEach(function(m){
    var expH=Math.max(2,Math.round((m.exp/maxMonthly)*120));
    var incH=Math.max(2,Math.round((m.inc/maxMonthly)*120));
    var hasData=m.exp>0||m.inc>0;
    html+='<div class="stats-month-col"><div style="display:flex;align-items:flex-end;gap:2px;height:120px">';
    html+='<div class="stats-month-bar" style="height:'+(m.exp>0?expH:0)+'px;background:var(--exp-t);opacity:.75;width:48%"></div>';
    html+='<div class="stats-month-bar" style="height:'+(m.inc>0?incH:0)+'px;background:var(--inc-t);opacity:.75;width:48%"></div>';
    html+='</div><div class="stats-month-lbl" style="opacity:'+(hasData?1:.4)+'">'+m.month+'</div></div>';
  });
  html+='</div></div>';

  // Top categories
  if(topCats.length){
    html+='<div class="sec-label">Top catégories</div><div class="stats-card full" style="margin-bottom:12px">';
    topCats.forEach(function(pair){
      var id=pair[0],amt=pair[1];
      var c=getCat(id);
      var pct=Math.round((amt/yearExp)*100);
      html+='<div class="stats-bar-row"><div style="font-size:16px;width:24px;flex-shrink:0">'+c.e+'</div>';
      html+='<div class="stats-bar-label">'+c.l+'</div>';
      html+='<div class="stats-bar-track"><div class="stats-bar-fill" style="width:'+Math.round((amt/maxCat)*100)+'%;background:'+c.c+'"></div></div>';
      html+='<div class="stats-bar-amt">'+fmtAmt(Math.round(amt))+' '+cur+'</div>';
      html+='<div style="font-size:11px;color:var(--t3);min-width:28px;text-align:right">'+pct+'%</div></div>';
    });
    html+='</div>';
  }

  if(!yearTx.length) html+='<div class="empty">Aucune donnée pour cette année.<br>Ajoute des transactions pour voir tes stats !</div>';
  html+='</div>';
  el.innerHTML=html;
}

/* ── NOTIFICATIONS ── */
function generateNotifs(){
  const notifs = [];
  const now = new Date();
  const today = fmtDate(now);
  const cur = prefs.currency||'€';
  const period = currentPeriod();

  // 1. Budget alerts
  const spent = {};
  data.transactions.filter(t=>inPeriod(t.date,period)&&t.type==='expense')
    .forEach(t=>{spent[t.cat]=(spent[t.cat]||0)+t.amount});
  data.budgets.forEach(b=>{
    const s = spent[b.cat]||0;
    const pct = Math.round((s/b.limit)*100);
    const c = getCat(b.cat);
    if(pct>=100){
      notifs.push({id:'budget_over_'+b.cat, type:'danger', emoji:'🚨',
        title:'Budget '+c.l+' dépassé !',
        msg:'Tu as dépensé '+fmtAmt(Math.round(s))+' '+cur+' sur '+fmtAmt(b.limit)+' '+cur+' ('+pct+'%)',
        date:today, read:false});
    } else if(pct>=80){
      notifs.push({id:'budget_warn_'+b.cat, type:'warn', emoji:'⚠️',
        title:`Budget ${c.l} bientôt atteint`,
        msg:`${pct}% utilisé — il te reste ${fmtAmt(Math.round(b.limit-s))} ${cur}`,
        date:today, read:false});
    }
  });

  // 2. End of period reminder (last 3 days)
  const endDate = new Date(period.end);
  const daysLeft = Math.round((endDate - now)/(1000*60*60*24));
  if(daysLeft >= 0 && daysLeft <= 3){
    const income = data.transactions.filter(t=>inPeriod(t.date,period)&&t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense = data.transactions.filter(t=>inPeriod(t.date,period)&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const left = income - expense;
    notifs.push({id:'period_end_'+period.end, type:'info', emoji:'📅',
    title:'Fin de période dans '+daysLeft+' jour'+(daysLeft>1?'s':''),
    msg:left>=0?('Il te reste '+fmtAmt(Math.round(left))+' '+cur+' non dépensés'):('Tu es à -'+fmtAmt(Math.round(Math.abs(left)))+' '+cur),
      date:today, read:false});
  }

  // 3. Recurring due today
  const todayDay = now.getDate();
  const dueToday = (data.recurring||[]).filter(r=>r.active&&r.freq==='monthly'&&r.day===todayDay);
  if(dueToday.length){
    notifs.push({id:'recurring_'+today, type:'info', emoji:'🔁',
    title:dueToday.length+' récurrence'+(dueToday.length>1?'s':'')+" aujourd'hui",
      msg:dueToday.map(r=>r.desc).join(', '),
      date:today, read:false});
  }

  // 4. Daily recap (if has transactions today)
  const todayTx = data.transactions.filter(t=>t.date===today);
  if(todayTx.length>0){
    const todayExp = todayTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    if(todayExp>0){
      notifs.push({id:'daily_'+today, type:'ok', emoji:'📊',
        title:`Récap du jour`,
    msg:'Tu as dépensé '+fmtAmt(Math.round(todayExp))+' '+cur+" aujourd'hui en "+todayTx.filter(t=>t.type==='expense').length+' transaction'+(todayTx.filter(t=>t.type==='expense').length>1?'s':''),
        date:today, read:false});
    }
  }

  // 5. Savings auto transfer
  const lastSavAuto = (data.savings||[]).filter(s=>s.auto).slice(-1)[0];
  if(lastSavAuto && lastSavAuto.date===today){
    notifs.push({id:'savings_auto_'+today, type:'ok', emoji:'💰',
      title:'Épargne automatique effectuée',
      msg:`${fmtAmt(lastSavAuto.amount)} ${cur} transférés depuis le reliquat de la période précédente`,
      date:today, read:false});
  }

  return notifs;
}

function getStoredNotifs(){
  const stored = JSON.parse(localStorage.getItem('budget_notifs')||'[]');
  const fresh = generateNotifs();
  // Merge: keep stored read status, add new ones
  const merged = [];
  fresh.forEach(n=>{
    const existing = stored.find(s=>s.id===n.id);
    merged.push(existing ? {id:n.id,type:n.type,emoji:n.emoji,title:n.title,msg:n.msg,date:n.date,read:existing.read} : n);
  });
  // Keep old read notifs from last 7 days
  const week = new Date(); week.setDate(week.getDate()-7);
  stored.filter(s=>s.read && s.date >= fmtDate(week) && !merged.find(m=>m.id===s.id))
        .forEach(s=>merged.push(s));
  merged.sort((a,b)=>b.date.localeCompare(a.date));
  return merged;
}

function saveNotifs(notifs){
  localStorage.setItem('budget_notifs', JSON.stringify(notifs));
}

function openNotifPanel(){
  const notifs = getStoredNotifs();
  saveNotifs(notifs);
  renderNotifList(notifs);
  document.getElementById('notifBg').classList.add('show');
}

function closeNotifPanel(e){
  if(!e||e.target===document.getElementById('notifBg'))
    document.getElementById('notifBg').classList.remove('show');
  updateNotifBadge();
}

function renderNotifList(notifs){
  const el = document.getElementById('notifList');
  if(!notifs.length){
    el.innerHTML='<div class="notif-empty">🎉 Tout est bon !<br>Aucune alerte pour le moment.</div>';
    return;
  }
  const unread = notifs.filter(n=>!n.read);
  const read = notifs.filter(n=>n.read);
  let html = '';
  if(unread.length){
    html += `<div class="notif-section-title">Nouvelles (${unread.length})</div>`;
    html += unread.map(n=>notifItemHtml(n)).join('');
  }
  if(read.length){
    html += `<div class="notif-section-title">Déjà lues</div>`;
    html += read.map(n=>notifItemHtml(n)).join('');
  }
  el.innerHTML = html;
}

function notifItemHtml(n){
  const typeClass = n.type==='danger'?'unread-danger':n.type==='warn'?'unread-warn':'unread';
  const bgColor = n.type==='danger'?'rgba(255,95,95,.12)':n.type==='warn'?'rgba(255,179,64,.12)':n.type==='ok'?'rgba(26,158,92,.12)':'rgba(79,142,255,.12)';
  return`<div class="notif-item${!n.read?' '+typeClass:''}" onclick="markRead('${n.id}')">
    <div class="notif-dot" style="background:${bgColor}">${n.emoji}</div>
    <div class="notif-info">
      <div class="notif-title">${n.title}</div>
      <div class="notif-msg">${n.msg}</div>
      <div class="notif-time">${n.date===fmtDate(new Date())?"Aujourd'hui":n.date.split('-').reverse().join('/')}</div>
    </div>
  </div>`;
}

function markRead(id){
  const notifs = getStoredNotifs();
  const n = notifs.find(n=>n.id===id);
  if(n) n.read = true;
  saveNotifs(notifs);
  renderNotifList(notifs);
  updateNotifBadge();
}

function clearNotifs(){
  const notifs = getStoredNotifs().map(n=>({id:n.id,type:n.type,emoji:n.emoji,title:n.title,msg:n.msg,date:n.date,read:true}));
  saveNotifs(notifs);
  renderNotifList(notifs);
  updateNotifBadge();
}

function updateNotifBadge(){
  const notifs = getStoredNotifs();
  const unread = notifs.filter(n=>!n.read).length;
  const bell = document.getElementById('notifBell');
  if(!bell) return;
  // Remove old badge
  const old = bell.querySelector('.notif-badge');
  if(old) old.remove();
  if(unread>0){
    const badge = document.createElement('div');
    badge.className='notif-badge';
    badge.textContent = unread>9?'9+':unread;
    bell.appendChild(badge);
  }
}

function checkBudgetRespected(d, count){
  const period = currentPeriod();
  const spent = {};
  d.transactions.filter(t=>inPeriod(t.date,period)&&t.type==='expense').forEach(t=>{spent[t.cat]=(spent[t.cat]||0)+t.amount});
  const ok = d.budgets.filter(b=>(spent[b.cat]||0)<=b.limit).length;
  return ok >= count;
}

function checkNoRestaurant(d){
  const periods = prevPeriods(3);
  for(const p of periods){
    const hasTx = d.transactions.some(t=>inPeriod(t.date,p));
    const hasResto = d.transactions.some(t=>inPeriod(t.date,p)&&t.cat==='restaurants');
    if(hasTx && !hasResto) return true;
  }
  return false;
}

function getStreak(d){
  if(!d.transactions.length) return 0;
  const dates = new Set(d.transactions.map(t=>t.date));
  let streak = 0;
  let day = new Date();
  while(true){
    const s = fmtDate(day);
    if(dates.has(s)){ streak++; day.setDate(day.getDate()-1); }
    else break;
  }
  return streak;
}

function calcScore(d){
  let score = 0;
  const period = currentPeriod();
  const mTx = d.transactions.filter(t=>inPeriod(t.date,period));
  const income = mTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = mTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  // 30pts - savings rate
  if(income>0){
    const sr = (income-expense)/income;
    score += Math.min(30, Math.round(sr*60));
  }

  // 25pts - budgets respected
  if(d.budgets.length>0){
    const spent={};
    mTx.filter(t=>t.type==='expense').forEach(t=>{spent[t.cat]=(spent[t.cat]||0)+t.amount});
    const ok = d.budgets.filter(b=>(spent[b.cat]||0)<=b.limit).length;
    score += Math.round((ok/d.budgets.length)*25);
  } else score += 15;

  // 20pts - has savings
  const totalSav = (d.savings||[]).filter(s=>s.type==='deposit').reduce((a,b)=>a+b.amount,0);
  if(totalSav>0) score += Math.min(20, Math.round(totalSav/100));

  // 15pts - streak
  const streak = getStreak(d);
  score += Math.min(15, streak);

  // 10pts - transactions this period
  if(mTx.length>=5) score += 10;
  else score += mTx.length*2;

  return Math.min(100, Math.round(score));
}

function getScoreGrade(score){
  if(score>=90) return {grade:'S', color:'#FFD700', bg:'rgba(255,215,0,.15)'};
  if(score>=75) return {grade:'A', color:'#63d9a0', bg:'rgba(99,217,160,.15)'};
  if(score>=60) return {grade:'B', color:'#4f8eff', bg:'rgba(79,142,255,.15)'};
  if(score>=40) return {grade:'C', color:'#ffb340', bg:'rgba(255,179,64,.15)'};
  return {grade:'D', color:'#ff8080', bg:'rgba(255,95,95,.15)'};
}

function getScoreBarColor(score){
  if(score>=90) return 'linear-gradient(90deg,#FFD700,#FFA500)';
  if(score>=75) return 'linear-gradient(90deg,#63d9a0,#2d9e6b)';
  if(score>=60) return 'linear-gradient(90deg,#4f8eff,#7b5ea7)';
  if(score>=40) return 'linear-gradient(90deg,#ffb340,#ff8c00)';
  return 'linear-gradient(90deg,#ff8080,#ff4040)';
}

  html += '<div style="font-size:12px;color:var(--t2);margin-bottom:10px">Appuie et glisse pour réordonner</div>';
  html += '<div class="nav-order-list" id="navOrderList">';
  order.forEach(function(id, i){
    var item = NAV_ITEMS.find(function(n){return n.id===id;});
    if(!item) return;
    html += '<div class="nav-order-item" draggable="true" data-idx="'+i+'" data-id="'+id+'"';
    html += ' ondragstart="navDragStart(event,'+i+')" ondragover="navDragOver(event,'+i+')" ondrop="navDrop(event,'+i+')" ondragend="navDragEnd(event)">';
    html += '<span class="nav-order-handle">⠿</span>';
    html += '<span class="nav-order-icon">'+item.emoji+'</span>';
    html += '<span class="nav-order-label">'+item.label+'</span>';
    if(i===0) html += '<span class="nav-order-badge">Premier</span>';
    html += '</div>';
  });
  html += '</div></div>';

  // Fav categories
  html += '<div class="sec-label">Catégories favorites</div>';
  html += '<div class="glass-card" style="padding:12px;margin-bottom:12px">';
  html += '<div style="font-size:12px;color:var(--t2);margin-bottom:10px">Apparaissent en premier lors de l\'ajout</div>';
  html += '<div class="fav-cats-grid">';
  CATS.expense.forEach(function(c){
    var isFav = favCats.indexOf(c.id) !== -1;
    html += '<div class="fav-cat-item'+(isFav?' selected':'')+'" onclick="toggleFavCat(\''+c.id+'\')">';
    html += '<div class="fav-cat-emoji">'+c.e+'</div>';
    html += '<div class="fav-cat-name">'+c.l+'</div>';
    html += '<div class="fav-cat-check">'+(isFav?'✓':'')+'</div>';
    html += '</div>';
  });
  html += '</div></div>';

  html += '</div>';
  el.innerHTML = html;
}

function navDragStart(e, idx){
  dragSrcIdx = idx;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function navDragOver(e, idx){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.nav-order-item').forEach(function(el){el.classList.remove('drag-over');});
  e.currentTarget.classList.add('drag-over');
}
function navDrop(e, idx){
  e.preventDefault();
  if(dragSrcIdx === null || dragSrcIdx === idx) return;
  var order = getNavOrder();
  var moved = order.splice(dragSrcIdx, 1)[0];
  order.splice(idx, 0, moved);
  prefs.navOrder = order;
  savePrefs();
  applyNavOrder();
  renderPerso();
  toast('✅ Ordre mis à jour !');
}
function navDragEnd(e){
  dragSrcIdx = null;
  document.querySelectorAll('.nav-order-item').forEach(function(el){
    el.classList.remove('dragging','drag-over');
  });
}

function toggleFavCat(id){
  var favCats = prefs.favCats || [];
  var idx = favCats.indexOf(id);
  if(idx === -1) favCats.push(id);
  else favCats.splice(idx, 1);
  prefs.favCats = favCats;
  savePrefs();
  renderPerso();
}

function applyNavOrder(){
  var order = getNavOrder();
  var navEl = document.querySelector('.nav-pill');
  if(!navEl) return;
  var btns = navEl.querySelectorAll('.nav-btn');
  var btnMap = {};
  btns.forEach(function(b){ btnMap[b.getAttribute('data-s')] = b; });
  // Reorder DOM
  order.forEach(function(id){
    if(btnMap[id]) navEl.appendChild(btnMap[id]);
  });
}

/* ── SWIPE TO DELETE / DUPLICATE ── */
var swipeState = {};

function initSwipe(el, txId){
  var startX = 0, startY = 0, currentX = 0, swiping = false, direction = null;
  var content = el.querySelector('.tx-swipe-content');
  if(!content) return;

  el.addEventListener('touchstart', function(e){
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    currentX = 0;
    swiping = true;
    direction = null;
    content.style.transition = 'none';
  }, {passive:true});

  el.addEventListener('touchmove', function(e){
    if(!swiping) return;
    var dx = e.touches[0].clientX - startX;
    var dy = e.touches[0].clientY - startY;
    if(direction === null){
      direction = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
    }
    if(direction === 'v') return;
    e.preventDefault();
    currentX = Math.min(0, dx);
    content.style.transform = 'translateX(' + Math.max(-136, currentX) + 'px)';
  }, {passive:false});

  el.addEventListener('touchend', function(){
    if(!swiping || direction !== 'h') return;
    swiping = false;
    content.style.transition = 'transform .2s cubic-bezier(.4,0,.2,1)';
    if(currentX < -90){
      content.style.transform = 'translateX(-136px)';
      swipeState[txId] = 'open';
    } else if(currentX < -30){
      content.style.transform = 'translateX(-68px)';
      swipeState[txId] = 'half';
    } else {
      content.style.transform = 'translateX(0)';
      swipeState[txId] = 'closed';
    }
  });
}

function closeAllSwipes(){
  document.querySelectorAll('.tx-swipe-content').forEach(function(c){
    c.style.transition = 'transform .2s cubic-bezier(.4,0,.2,1)';
    c.style.transform = 'translateX(0)';
  });
  swipeState = {};
}

function duplicateTx(id){
  closeAllSwipes();
  var tx = data.transactions.find(function(t){return t.id===id;});
  if(!tx) return;
  var newTx = {id:Date.now(), type:tx.type, amount:tx.amount, desc:tx.desc+'(copie)', cat:tx.cat, date:fmtDate(new Date()), note:tx.note||''};
  data.transactions.unshift(newTx);
  save();
  renderHistory();
  toast('📋 Transaction dupliquée !');
  checkNewBadges();
}

function swipeDeleteTx(id){
  closeAllSwipes();
  openModal('Supprimer ?', '', function(){
    data.transactions = data.transactions.filter(function(t){return t.id!==id;});
    save();
    renderHistory();
    toast('🗑 Supprimée');
  });
}

/* ── RAPPORT MENSUEL ── */
function generateRapport(){
  var cur = prefs.currency||'€';
  var period = currentPeriod();
  var mTx = data.transactions.filter(function(t){return inPeriod(t.date,period);});
  var income = mTx.filter(function(t){return t.type==='income';}).reduce(function(s,t){return s+t.amount;},0);
  var expense = mTx.filter(function(t){return t.type==='expense';}).reduce(function(s,t){return s+t.amount;},0);
  var balance = income - expense;
  var savRate = income>0?Math.round(((income-expense)/income)*100):0;

  // Top cats
  var byCat = {};
  mTx.filter(function(t){return t.type==='expense';}).forEach(function(t){byCat[t.cat]=(byCat[t.cat]||0)+t.amount;});
  var topCats = Object.entries(byCat).sort(function(a,b){return b[1]-a[1];}).slice(0,3);

  var score = calcScore(data);
  var grade = getScoreGrade(score);
  var streak = getStreak(data);

  var lines = [
    '📊 Rapport ' + period.label,
    '━━━━━━━━━━━━━━━━━━━━',
    '💰 Revenus    : +' + fmtAmt(Math.round(income)) + ' ' + cur,
    '💸 Dépenses   : -' + fmtAmt(Math.round(expense)) + ' ' + cur,
    '📈 Solde      : ' + (balance>=0?'+':'') + fmtAmt(Math.round(balance)) + ' ' + cur,
    '🎯 Taux épar. : ' + Math.max(0,savRate) + '%',
    '',
    '🏆 Top dépenses :',
  ];
  topCats.forEach(function(pair){
    var c = getCat(pair[0]);
    lines.push('  ' + c.e + ' ' + c.l + ' : ' + fmtAmt(Math.round(pair[1])) + ' ' + cur);
  });
  lines.push('');
  lines.push('⭐ Score : ' + score + '/100 (Rang ' + grade.grade + ')');
  lines.push('🔥 Streak : ' + streak + ' jours');
  lines.push('━━━━━━━━━━━━━━━━━━━━');
  lines.push('via Mon Budget ' + (prefs.appUrl||''));

  var text = lines.join('\n');

  if(navigator.share){
    navigator.share({title:'Mon rapport budget', text:text}).catch(function(){});
  } else {
    navigator.clipboard.writeText(text).then(function(){
      toast('📋 Rapport copié !');
    }).catch(function(){
      toast('📊 ' + text.slice(0,60) + '...');
    });
  }
}
