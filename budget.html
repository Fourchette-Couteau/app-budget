const FREQ_LABELS = {monthly:'Mensuel', weekly:'Hebdo', bimonthly:'Bi-mensuel'};

function getNextDate(rec){
  // Find the next date this recurring tx should fire
  const today = new Date().toISOString().split('T')[0];
  const pd = prefs.payDay || 25;
  if(rec.freq === 'monthly'){
    const now = new Date();
    let d = new Date(now.getFullYear(), now.getMonth(), rec.day);
    if(d.toISOString().split('T')[0] < today) d = new Date(now.getFullYear(), now.getMonth()+1, rec.day);
    return d.toISOString().split('T')[0];
  }
  return today;
}


function processEndOfPeriodSavings(){
  if(prefs.autoSavings === false) return;
  if(!data.savings) data.savings = [];

  const today = fmtDate(new Date());
  const pd = prefs.payDay || 25;

  // Get current period start to know what the PREVIOUS period was
  const period = currentPeriod();
  const prevEnd = new Date(period.start);
  prevEnd.setDate(prevEnd.getDate() - 1);
  const prevEndStr = fmtDate(prevEnd);

  // Get previous period start
  const prevStart = new Date(period.start);
  prevStart.setMonth(prevStart.getMonth() - 1);
  // Clamp to last day if needed
  const prevStartStr = fmtDate(new Date(prevStart.getFullYear(), prevStart.getMonth(), clampDay(prevStart.getFullYear(), prevStart.getMonth(), pd)));

  // Check if we already did auto-savings for this period transition
  const alreadyDone = data.savings.some(s => s.autoForPeriod === period.start);
  if(alreadyDone) return;

  // Only run on payday or just after (first 2 days of new period)
  const daysSinceStart = Math.round((new Date(today) - new Date(period.start)) / (1000*60*60*24));
  if(daysSinceStart > 2) return; // Only run in first 2 days of new period

  // Calculate previous period balance
  const prevTx = data.transactions.filter(t => t.date >= prevStartStr && t.date <= prevEndStr);
  if(prevTx.length === 0) return; // No transactions in prev period, skip

  const prevIncome  = prevTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount, 0);
  const prevExpense = prevTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount, 0);
  const leftover = Math.round((prevIncome - prevExpense) * 100) / 100;

  if(leftover <= 0) return; // Nothing to save or negative, skip

  // Add to savings automatically
  data.savings.push({
    id: Date.now(),
    type: 'deposit',
    amount: leftover,
    desc: `Reliquat période ${prevStartStr.slice(8)}/${prevStartStr.slice(5,7)} → ${prevEndStr.slice(8)}/${prevEndStr.slice(5,7)}`,
    date: today,
    autoForPeriod: period.start, // marker so we don't do it twice
    auto: true
  });
  save();

  setTimeout(()=>{
    toast(`💰 ${leftover.toLocaleString('fr-FR')} € transférés en épargne !`);
  }, 2500);
}
function processDueRecurring(){
  if(!data.recurring || data.recurring.length === 0) return;
  const today = new Date().toISOString().split('T')[0];
  const todayDay = new Date().getDate();
  let added = 0;
  data.recurring.forEach(rec => {
    if(!rec.active) return;
    if(rec.freq === 'monthly' && todayDay === rec.day){
      // Check if already added this month
      const monthStr = today.slice(0,7);
      const alreadyAdded = data.transactions.some(t =>
        t.recurringId === rec.id && t.date.startsWith(monthStr)
      );
      if(!alreadyAdded){
        data.transactions.unshift({
          id: Date.now() + Math.random(),
          type: rec.type,
          amount: rec.amount,
          desc: rec.desc + ' (auto)',
          cat: rec.cat,
          date: today,
          recurringId: rec.id
        });
        added++;
      }
    }
  });
  if(added > 0){
    save();
    toast('🔁 ' + added + ' transaction(s) récurrente(s) ajoutée(s) !');
  }
}

let pinBuffer = '';

let pinTemp = '';
let pinResolve = null;

function initPinScreen(){

function showPinScreen(mode='unlock'){
  pinMode = mode;
  pinBuffer = '';
  pinTemp = '';
  initPinScreen();
  updatePinDots();
  const sub = document.getElementById('pinSubtitle');
  const hint = document.getElementById('pinHint');
  const err = document.getElementById('pinError');
  if(err) err.textContent = '';
  if(mode === 'unlock'){
    if(sub) sub.textContent = 'Entrer le code';
    if(hint) hint.textContent = '';
    // Show Face ID button if available
    const fb = document.getElementById('pinFaceBtn');
    if(fb){fb.style.opacity='1';fb.textContent='🫥';}
    tryFaceID();
  } else if(mode === 'setup1'){
    if(sub) sub.textContent = 'Nouveau code PIN';
    if(hint) hint.textContent = 'Choisissez un code à 4 chiffres pour protéger vos données.';
    const fb = document.getElementById('pinFaceBtn');
    if(fb) fb.style.opacity='0';
  } else if(mode === 'setup2'){
    if(sub) sub.textContent = 'Confirmer le code';
    if(hint) hint.textContent = '';
  }
  document.getElementById('pinScreen').classList.add('show');
}

function hidePinScreen(){
  document.getElementById('pinScreen').classList.remove('show');
}

function updatePinDots(){
  for(let i=0;i<4;i++){
    const d = document.getElementById('pd'+i);
    if(d){
      d.classList.toggle('filled', i < pinBuffer.length);
      d.classList.remove('error');
    }
  }
}

function pinShakeError(msg){
  for(let i=0;i<4;i++){
    const d = document.getElementById('pd'+i);
    if(d){ d.classList.remove('filled'); void d.offsetWidth; d.classList.add('error'); }
  }
  const err = document.getElementById('pinError');
  if(err) err.textContent = msg;
  setTimeout(()=>{ pinBuffer=''; updatePinDots(); }, 600);
}

function pinKey(k){
  if(pinBuffer.length >= 4) return;
  pinBuffer += k;
  updatePinDots();
  if(pinBuffer.length === 4){
    setTimeout(()=>handlePinComplete(), 150);
  }
}

function pinDel(){
  if(pinBuffer.length > 0){
    pinBuffer = pinBuffer.slice(0,-1);
    updatePinDots();
  }
}

function handlePinComplete(){
  const stored = localStorage.getItem('budget_pin');
  if(pinMode === 'unlock'){
    if(pinBuffer === stored){
      hidePinScreen();
      pinBuffer = '';
      updatePinDots();
    } else {
      pinShakeError('Code incorrect');
    }
  } else if(pinMode === 'setup1'){
    pinTemp = pinBuffer;
    pinBuffer = '';
    updatePinDots();
    showPinScreen('setup2');
  } else if(pinMode === 'setup2'){
    if(pinBuffer === pinTemp){
      localStorage.setItem('budget_pin', pinBuffer);
      prefs.pinEnabled = true;
      savePrefs();
      hidePinScreen();
      toast('🔒 Code PIN activé !');
      renderSettings();
    } else {
      pinShakeError('Les codes ne correspondent pas');
      pinTemp = '';
      setTimeout(()=>showPinScreen('setup1'), 800);
    }
  }
}

function openPinSetup(){
  if(prefs.pinEnabled){
    openModal('Code PIN', 'Désactiver ou modifier le code PIN ?', ()=>{
      // Disable
      localStorage.removeItem('budget_pin');
      prefs.pinEnabled = false;
      savePrefs();
      toast('🔓 Code PIN désactivé');
      renderSettings();
    });
    // Add modify option - just show setup after modal cancel

    showPinScreen('setup1');
  }
}

let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let calSelectedDay = null;

function renderCalendar(){
  const cur = prefs.currency || '€';
  const today = new Date();
  const todayStr = fmtDate(today);

  // All transactions for current cal month
  const monthStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const monthTx = data.transactions.filter(t => t.date.startsWith(monthStr));

  // Build day map: date -> {expense, income, txs}
  const dayMap = {};
  monthTx.forEach(t => {
    if(!dayMap[t.date]) dayMap[t.date] = {expense:0, income:0, txs:[]};
    if(t.type==='expense') dayMap[t.date].expense += t.amount;
    else dayMap[t.date].income += t.amount;
    dayMap[t.date].txs.push(t);
  });

  // Month stats
  const totalExp = monthTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const totalInc = monthTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const daysWithTx = Object.keys(dayMap).length;

  // Max expense for color intensity
  const maxExp = Math.max(...Object.values(dayMap).map(d=>d.expense), 1);

  // Calendar grid
  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const startOffset = (firstDay + 6) % 7; // Mon=0
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const monthLabel = new Date(calYear, calMonth, 1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'});

  // Period boundaries for highlighting
  const period = currentPeriod();

  let cells = '';
  // Empty cells before first day
  for(let i=0;i<startOffset;i++) cells += '<div class="cal-day empty"></div>';
  // Day cells
  for(let d=1;d<=daysInMonth;d++){
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayData = dayMap[dateStr];
    const isToday = dateStr === todayStr;
    const isSel = dateStr === calSelectedDay;
    const inPer = dateStr >= period.start && dateStr <= period.end;
    let dotColor = 'transparent';
    let bgStyle = '';
    if(dayData){
      if(dayData.expense > 0 && dayData.income > 0){
        dotColor = '#7b5ea7';
      } else if(dayData.expense > 0){
        const intensity = Math.round(40 + (dayData.expense/maxExp)*160);
        dotColor = `rgba(255,95,95,1)`;
        bgStyle = `background:rgba(255,95,95,${0.06 + (dayData.expense/maxExp)*0.18})`;
      } else if(dayData.income > 0){
        dotColor = 'var(--inc-t)';
        bgStyle = 'background:rgba(26,158,92,0.1)';
      }
    }
    cells += `<div class="cal-day${isToday?' today':''}${isSel?' selected':''}${inPer?' in-period':''}" 
      style="${bgStyle}" onclick="selectCalDay('${dateStr}')">
      <div class="cal-day-num">${d}</div>
      ${dayData?`<div class="cal-dot" style="background:${dotColor}"></div>`:'<div style="height:7px"></div>'}
    </div>`;
  }

  // Selected day detail
  let detailHtml = '';
  if(calSelectedDay){
    const sd = dayMap[calSelectedDay];
    const [sy,sm,sday] = calSelectedDay.split('-');
    const dateLabel = new Date(parseInt(sy),parseInt(sm)-1,parseInt(sday)).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    if(sd && sd.txs.length > 0){
      detailHtml = `<div class="cal-detail">
        <div class="cal-detail-header">
          <div class="cal-detail-date">${dateLabel}</div>
          <div class="cal-detail-total" style="color:${sd.expense>0?'var(--exp-t)':'var(--inc-t)'}">
            ${sd.expense>0?'-'+fmtAmt(Math.round(sd.expense)):'+'+fmtAmt(Math.round(sd.income))} ${cur}
          </div>
        </div>
        ${sd.txs.map((t,i)=>{const c=getCat(t.cat);return`
          ${i>0?'<div class="divider"></div>':''}
          <div class="tx-item" onclick="openEditTx(${t.id})" style="cursor:pointer">
            <div class="tx-icon">${c.e}</div>
            <div class="tx-info"><div class="tx-name">${t.desc}</div><div class="tx-meta">${c.l}</div></div>
            <div class="tx-amt ${t.type==='expense'?'exp':'inc'}">${t.type==='expense'?'-':'+'}${fmtAmt(t.amount)} ${cur}</div>
            <span style="font-size:16px;color:var(--t3)">›</span>
          </div>`}).join('')}
      </div>`;
    } else {
      detailHtml = `<div class="cal-detail" style="padding:24px;text-align:center;color:var(--t3);font-size:14px">${dateLabel}<br>Aucune transaction</div>`;
    }
  }

  const el = document.getElementById('s-calendar');
  el.innerHTML = `<div class="cal-pad">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calMove(-1)">‹</button>
      <div class="cal-month-label">${monthLabel}</div>
      <button class="cal-nav-btn" onclick="calMove(1)">›</button>
    </div>

    <div class="cal-summary-cards">
      <div class="cal-sum-card">
        <div class="cal-sum-val" style="color:var(--exp-t)">${fmtAmt(Math.round(totalExp))} ${cur}</div>
        <div class="cal-sum-label">Dépenses</div>
      </div>
      <div class="cal-sum-card">
        <div class="cal-sum-val" style="color:var(--inc-t)">${fmtAmt(Math.round(totalInc))} ${cur}</div>
        <div class="cal-sum-label">Revenus</div>
      </div>
      <div class="cal-sum-card">
        <div class="cal-sum-val">${daysWithTx}</div>
        <div class="cal-sum-label">Jours actifs</div>
      </div>
    </div>

    <div class="cal-weekdays" style="margin-top:14px">
      ${['L','M','M','J','V','S','D'].map(d=>`<div class="cal-wd">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">${cells}</div>

    <div class="cal-legend">
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(255,95,95,.8)"></div>Dépense</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--inc-t)"></div>Revenu</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#7b5ea7"></div>Les deux</div>
    </div>

    ${detailHtml}
  </div>`;
}

function selectCalDay(dateStr){
  calSelectedDay = calSelectedDay === dateStr ? null : dateStr;
  renderCalendar();
  if(calSelectedDay){
    setTimeout(()=>{
      const det = document.querySelector('.cal-detail');
      if(det) det.scrollIntoView({behavior:'smooth',block:'nearest'});
    },100);
  }
}

function calMove(dir){
  calMonth += dir;
  if(calMonth > 11){calMonth=0;calYear++;}
  if(calMonth < 0){calMonth=11;calYear--;}
  calSelectedDay = null;
  renderCalendar();
}

function updateAppUrl(v){
  prefs.appUrl = v.trim();
  savePrefs();
  const el = document.getElementById('appUrlDisplay');
  if(el) el.textContent = prefs.appUrl || 'Non configuré';
}

function shareApp(){
  const url = prefs.appUrl || window.location.href;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>{
      toast('🔗 Lien copié !');
    }).catch(()=>fallbackCopy(url));
  } else {
    fallbackCopy(url);
  }
}

function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); toast('🔗 Lien copié !'); }
  catch(e){ toast('❌ Impossible de copier'); }
  document.body.removeChild(ta);
}

function nativeShare(){
  const url = prefs.appUrl || window.location.href;
  const name = prefs.appName || 'Mon Budget';
  if(navigator.share){
    navigator.share({
      title: name,
      text: `Gère ton budget avec ${name} — une appli gratuite !`,
      url: url
    }).catch(()=>{});
  } else {
    shareApp(); // fallback to copy
    toast('🔗 Lien copié (partage natif non dispo)');
  }
}

let statsYear = new Date().getFullYear();

function renderStats(){
  const cur = prefs.currency||'€';
  const now = new Date();

  // All years available
  const years = [...new Set(data.transactions.map(t=>parseInt(t.date.slice(0,4))))].sort().reverse();
  if(!years.includes(statsYear) && years.length) statsYear = years[0];

  // Year transactions
  const yearTx = data.transactions.filter(t=>t.date.startsWith(statsYear+''));
  const yearExp = yearTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const yearInc = yearTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const yearSav = yearInc - yearExp;
  const savRate = yearInc>0 ? Math.round((yearSav/yearInc)*100) : 0;

  // Previous year comparison
  const prevYearTx = data.transactions.filter(t=>t.date.startsWith((statsYear-1)+''));
  const prevYearExp = prevYearTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const expDiff = prevYearExp>0 ? Math.round(((yearExp-prevYearExp)/prevYearExp)*100) : null;

  // By category
  const byCat = {};
  yearTx.filter(t=>t.type==='expense').forEach(t=>{byCat[t.cat]=(byCat[t.cat]||0)+t.amount});
  const topCats = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxCat = topCats.length ? topCats[0][1] : 1;

  // Monthly breakdown (12 months)
  const monthly = Array.from({length:12},(_,i)=>{
    const m = String(i+1).padStart(2,'0');
    const ms = `${statsYear}-${m}`;
    const e = yearTx.filter(t=>t.date.startsWith(ms)&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const r = yearTx.filter(t=>t.date.startsWith(ms)&&t.type==='income').reduce((s,t)=>s+t.amount,0);
    return {month:['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'][i], exp:e, inc:r};
  });
  const maxMonthly = Math.max(...monthly.map(m=>Math.max(m.exp,m.inc)),1);

  // Avg per period
  const periodsWithData = monthly.filter(m=>m.exp>0||m.inc>0).length||1;
  const avgMonthlyExp = Math.round(yearExp/periodsWithData);
  const avgMonthlyInc = Math.round(yearInc/periodsWithData);

  // Best/worst month
  const expMonths = monthly.filter(m=>m.exp>0);
  const bestMonth = expMonths.length ? expMonths.reduce((a,b)=>a.exp<b.exp?a:b) : null;
  const worstMonth = expMonths.length ? expMonths.reduce((a,b)=>a.exp>b.exp?a:b) : null;

  const el = document.getElementById('s-stats');
  el.innerHTML = `<div class="stats-pad">

    <div class="stats-year-toggle">
      ${years.length ? years.map(y=>`<div class="stats-year-btn${y===statsYear?' active':''}" onclick="statsYear=${y};renderStats()">${y}</div>`).join('') : `<div class="stats-year-btn active">${statsYear}</div>`}
    </div>

    <div class="stats-hero">
      <div class="stats-card">
        <div class="stats-card-label">Dépenses</div>
        <div class="stats-card-val red">${fmtAmt(Math.round(yearExp))} ${cur}</div>
        ${expDiff!==null?`<div class="stats-card-sub" style="color:${expDiff>0?'var(--exp-t)':'var(--inc-t)'}">${expDiff>0?'▲':'▼'} ${Math.abs(expDiff)}% vs ${statsYear-1}</div>`:'<div class="stats-card-sub">Année en cours</div>'}
      </div>
      <div class="stats-card">
        <div class="stats-card-label">Revenus</div>
        <div class="stats-card-val green">${fmtAmt(Math.round(yearInc))} ${cur}</div>
        <div class="stats-card-sub">Moy. ${fmtAmt(avgMonthlyInc)} ${cur}/mois</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-label">Épargne nette</div>
        <div class="stats-card-val ${yearSav>=0?'green':'red'}">${yearSav>=0?'+':''}${fmtAmt(Math.round(yearSav))} ${cur}</div>
        <div class="stats-card-sub">Taux ${Math.max(0,savRate)}%</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-label">Moy. dépenses</div>
        <div class="stats-card-val accent">${fmtAmt(avgMonthlyExp)} ${cur}</div>
        <div class="stats-card-sub">par période</div>
      </div>
    </div>

    ${bestMonth||worstMonth?`
    <div class="stats-card full" style="margin-bottom:12px">
      <div class="stats-card-label">Meilleur & pire mois</div>
      <div style="display:flex;gap:10px;margin-top:6px">
        ${bestMonth?`<div style="flex:1;background:rgba(26,158,92,.08);border-radius:10px;padding:10px 12px"><div style="font-size:11px;color:var(--inc-t);font-weight:600;margin-bottom:2px">🏆 Meilleur</div><div style="font-size:15px;font-weight:500">${bestMonth.month}</div><div style="font-size:12px;color:var(--t2)">${fmtAmt(Math.round(bestMonth.exp))} ${cur}</div></div>`:''}
        ${worstMonth?`<div style="flex:1;background:rgba(255,95,95,.08);border-radius:10px;padding:10px 12px"><div style="font-size:11px;color:var(--exp-t);font-weight:600;margin-bottom:2px">⚠️ Plus chargé</div><div style="font-size:15px;font-weight:500">${worstMonth.month}</div><div style="font-size:12px;color:var(--t2)">${fmtAmt(Math.round(worstMonth.exp))} ${cur}</div></div>`:''}
      </div>
    </div>`:'' }

    <div class="sec-label">Évolution mensuelle</div>
    <div class="stats-card full" style="margin-bottom:12px">
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--exp-t)"><div style="width:10px;height:10px;border-radius:2px;background:var(--exp-t);opacity:.7"></div>Dépenses</div>
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--inc-t)"><div style="width:10px;height:10px;border-radius:2px;background:var(--inc-t);opacity:.7"></div>Revenus</div>
      </div>
      <div class="stats-month-chart">
        ${monthly.map(m=>{
          const expH = Math.max(2, Math.round((m.exp/maxMonthly)*120));
          const incH = Math.max(2, Math.round((m.inc/maxMonthly)*120));
          const hasData = m.exp>0||m.inc>0;
          return`<div class="stats-month-col">
            <div style="display:flex;align-items:flex-end;gap:2px;height:120px">
              <div class="stats-month-bar" style="height:${m.exp>0?expH:0}px;background:var(--exp-t);opacity:.75;width:48%"></div>
              <div class="stats-month-bar" style="height:${m.inc>0?incH:0}px;background:var(--inc-t);opacity:.75;width:48%"></div>
            </div>
            <div class="stats-month-lbl" style="opacity:${hasData?1:.4}">${m.month}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    ${topCats.length?`
    <div class="sec-label">Top catégories</div>
    <div class="stats-card full" style="margin-bottom:12px">
      ${topCats.map(([id,amt])=>{
        const c=getCat(id);
        const pct=Math.round((amt/yearExp)*100);
        return`<div class="stats-bar-row">
          <div style="font-size:16px;width:24px;flex-shrink:0">${c.e}</div>
          <div class="stats-bar-label">${c.l}</div>
          <div class="stats-bar-track"><div class="stats-bar-fill" style="width:${Math.round((amt/maxCat)*100)}%;background:${c.c}"></div></div>
          <div class="stats-bar-amt">${fmtAmt(Math.round(amt))} ${cur}</div>
          <div style="font-size:11px;color:var(--t3);min-width:28px;text-align:right">${pct}%</div>
        </div>`;
      }).join('')}
    </div>`:'' }

    ${!yearTx.length?'<div class="empty">Aucune donnée pour cette année.<br>Ajoute des transactions pour voir tes stats !</div>':''}
  </div>`;
}

/* ── NOTIFICATIONS ── */
function generateNotifs(){
  const notifs = [];
  const now = new Date();
  const today = fmtDate(now);
  const cur = prefs.currency||'€';
  const period = currentPeriod();

  // 1. Budget alerts
  const spent = {};
  data.transactions.filter(t=>inPeriod(t.date,period)&&t.type==='expense')
    .forEach(t=>{spent[t.cat]=(spent[t.cat]||0)+t.amount});
  data.budgets.forEach(b=>{
    const s = spent[b.cat]||0;
    const pct = Math.round((s/b.limit)*100);
    const c = getCat(b.cat);
    if(pct>=100){
      notifs.push({id:'budget_over_'+b.cat, type:'danger', emoji:'🚨',
        title:`Budget ${c.l} dépassé !`,
        msg:`Tu as dépensé ${fmtAmt(Math.round(s))} ${cur} sur ${fmtAmt(b.limit)} ${cur} (${pct}%)`,
        date:today, read:false});
    } else if(pct>=80){
      notifs.push({id:'budget_warn_'+b.cat, type:'warn', emoji:'⚠️',
        title:`Budget ${c.l} bientôt atteint`,
        msg:`${pct}% utilisé — il te reste ${fmtAmt(Math.round(b.limit-s))} ${cur}`,
        date:today, read:false});
    }
  });

  // 2. End of period reminder (last 3 days)
  const endDate = new Date(period.end);
  const daysLeft = Math.round((endDate - now)/(1000*60*60*24));
  if(daysLeft >= 0 && daysLeft <= 3){
    const income = data.transactions.filter(t=>inPeriod(t.date,period)&&t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense = data.transactions.filter(t=>inPeriod(t.date,period)&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const left = income - expense;
    notifs.push({id:'period_end_'+period.end, type:'info', emoji:'📅',
      title:`Fin de période dans ${daysLeft} jour${daysLeft>1?'s':''}`,
      msg:left>=0?`Il te reste ${fmtAmt(Math.round(left))} ${cur} non dépensés`:`Tu es à -${fmtAmt(Math.round(Math.abs(left)))} ${cur}`,
      date:today, read:false});
  }

  // 3. Recurring due today
  const todayDay = now.getDate();
  const dueToday = (data.recurring||[]).filter(r=>r.active&&r.freq==='monthly'&&r.day===todayDay);
  if(dueToday.length){
    notifs.push({id:'recurring_'+today, type:'info', emoji:'🔁',
      title:`${dueToday.length} récurrence${dueToday.length>1?'s':''} aujourd\'hui`,
      msg:dueToday.map(r=>r.desc).join(', '),
      date:today, read:false});
  }

  // 4. Daily recap (if has transactions today)
  const todayTx = data.transactions.filter(t=>t.date===today);
  if(todayTx.length>0){
    const todayExp = todayTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    if(todayExp>0){
      notifs.push({id:'daily_'+today, type:'ok', emoji:'📊',
        title:`Récap du jour`,
        msg:`Tu as dépensé ${fmtAmt(Math.round(todayExp))} ${cur} aujourd\'hui en ${todayTx.filter(t=>t.type==='expense').length} transaction${todayTx.filter(t=>t.type==='expense').length>1?'s':''}`,
        date:today, read:false});
    }
  }

  // 5. Savings auto transfer
  const lastSavAuto = (data.savings||[]).filter(s=>s.auto).slice(-1)[0];
  if(lastSavAuto && lastSavAuto.date===today){
    notifs.push({id:'savings_auto_'+today, type:'ok', emoji:'💰',
      title:'Épargne automatique effectuée',
      msg:`${fmtAmt(lastSavAuto.amount)} ${cur} transférés depuis le reliquat de la période précédente`,
      date:today, read:false});
  }

  return notifs;
}

function getStoredNotifs(){
  const stored = JSON.parse(localStorage.getItem('budget_notifs')||'[]');
  const fresh = generateNotifs();
  // Merge: keep stored read status, add new ones
  const merged = [];
  fresh.forEach(n=>{
    const existing = stored.find(s=>s.id===n.id);
    merged.push(existing ? {...n, read:existing.read} : n);
  });
  // Keep old read notifs from last 7 days
  const week = new Date(); week.setDate(week.getDate()-7);
  stored.filter(s=>s.read && s.date >= fmtDate(week) && !merged.find(m=>m.id===s.id))
        .forEach(s=>merged.push(s));
  merged.sort((a,b)=>b.date.localeCompare(a.date));
  return merged;
}

function saveNotifs(notifs){
  localStorage.setItem('budget_notifs', JSON.stringify(notifs));
}

function openNotifPanel(){
  const notifs = getStoredNotifs();
  saveNotifs(notifs);
  renderNotifList(notifs);
  document.getElementById('notifBg').classList.add('show');
}

function closeNotifPanel(e){
  if(!e||e.target===document.getElementById('notifBg'))
    document.getElementById('notifBg').classList.remove('show');
  updateNotifBadge();
}

function renderNotifList(notifs){
  const el = document.getElementById('notifList');
  if(!notifs.length){
    el.innerHTML='<div class="notif-empty">🎉 Tout est bon !<br>Aucune alerte pour le moment.</div>';
    return;
  }
  const unread = notifs.filter(n=>!n.read);
  const read = notifs.filter(n=>n.read);
  let html = '';
  if(unread.length){
    html += `<div class="notif-section-title">Nouvelles (${unread.length})</div>`;
    html += unread.map(n=>notifItemHtml(n)).join('');
  }
  if(read.length){
    html += `<div class="notif-section-title">Déjà lues</div>`;
    html += read.map(n=>notifItemHtml(n)).join('');
  }
  el.innerHTML = html;
}

function notifItemHtml(n){
  const typeClass = n.type==='danger'?'unread-danger':n.type==='warn'?'unread-warn':'unread';
  const bgColor = n.type==='danger'?'rgba(255,95,95,.12)':n.type==='warn'?'rgba(255,179,64,.12)':n.type==='ok'?'rgba(26,158,92,.12)':'rgba(79,142,255,.12)';
  return`<div class="notif-item${!n.read?' '+typeClass:''}" onclick="markRead('${n.id}')">
    <div class="notif-dot" style="background:${bgColor}">${n.emoji}</div>
    <div class="notif-info">
      <div class="notif-title">${n.title}</div>
      <div class="notif-msg">${n.msg}</div>
      <div class="notif-time">${n.date===fmtDate(new Date())?"Aujourd'hui":n.date.split('-').reverse().join('/')}</div>
    </div>
  </div>`;
}

function markRead(id){
  const notifs = getStoredNotifs();
  const n = notifs.find(n=>n.id===id);
  if(n) n.read = true;
  saveNotifs(notifs);
  renderNotifList(notifs);
  updateNotifBadge();
}

function clearNotifs(){
  const notifs = getStoredNotifs().map(n=>({...n,read:true}));
  saveNotifs(notifs);
  renderNotifList(notifs);
  updateNotifBadge();
}

function updateNotifBadge(){
  const notifs = getStoredNotifs();
  const unread = notifs.filter(n=>!n.read).length;
  const bell = document.getElementById('notifBell');
  if(!bell) return;
  // Remove old badge
  const old = bell.querySelector('.notif-badge');
  if(old) old.remove();
  if(unread>0){
    const badge = document.createElement('div');
    badge.className='notif-badge';
    badge.textContent = unread>9?'9+':unread;
    bell.appendChild(badge);
  }
}

  // Épargne
  {id:'sav_500',      emoji:'💰', name:'Économe',           desc:'500 € mis de côté',                        check:(d,cur)=>(d.savings||[]).filter(s=>s.type==='deposit').reduce((a,b)=>a+b.amount,0)>=500},
  {id:'sav_2000',     emoji:'💎', name:'Investisseur',      desc:'2 000 € mis de côté',                      check:(d,cur)=>(d.savings||[]).filter(s=>s.type==='deposit').reduce((a,b)=>a+b.amount,0)>=2000},

  {id:'budget_ok_1',  emoji:'✅', name:'Discipliné',        desc:'1 budget respecté sur une période',        check:d=>checkBudgetRespected(d,1)},

  {id:'streak_7',     emoji:'📆', name:'Régulier',          desc:'7 jours consécutifs avec transactions',    check:d=>getStreak(d)>=7},

  {id:'no_resto_month',emoji:'🥗',name:'Cuisinier',         desc:'Zéro restaurant sur une période complète', check:d=>checkNoRestaurant(d)},

function checkBudgetRespected(d, count){
  const period = currentPeriod();
  const spent = {};
  d.transactions.filter(t=>inPeriod(t.date,period)&&t.type==='expense').forEach(t=>{spent[t.cat]=(spent[t.cat]||0)+t.amount});
  const ok = d.budgets.filter(b=>(spent[b.cat]||0)<=b.limit).length;
  return ok >= count;
}

function checkNoRestaurant(d){
  const periods = prevPeriods(3);
  for(const p of periods){
    const hasTx = d.transactions.some(t=>inPeriod(t.date,p));
    const hasResto = d.transactions.some(t=>inPeriod(t.date,p)&&t.cat==='restaurants');
    if(hasTx && !hasResto) return true;
  }
  return false;
}

function getStreak(d){
  if(!d.transactions.length) return 0;
  const dates = new Set(d.transactions.map(t=>t.date));
  let streak = 0;
  let day = new Date();
  while(true){
    const s = fmtDate(day);
    if(dates.has(s)){ streak++; day.setDate(day.getDate()-1); }
    else break;
  }
  return streak;
}

function calcScore(d){
  let score = 0;
  const period = currentPeriod();
  const mTx = d.transactions.filter(t=>inPeriod(t.date,period));
  const income = mTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = mTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  // 30pts - savings rate
  if(income>0){
    const sr = (income-expense)/income;
    score += Math.min(30, Math.round(sr*60));
  }

  // 25pts - budgets respected
  if(d.budgets.length>0){
    const spent={};
    mTx.filter(t=>t.type==='expense').forEach(t=>{spent[t.cat]=(spent[t.cat]||0)+t.amount});
    const ok = d.budgets.filter(b=>(spent[b.cat]||0)<=b.limit).length;
    score += Math.round((ok/d.budgets.length)*25);
  } else score += 15;

  // 20pts - has savings
  const totalSav = (d.savings||[]).filter(s=>s.type==='deposit').reduce((a,b)=>a+b.amount,0);
  if(totalSav>0) score += Math.min(20, Math.round(totalSav/100));

  // 15pts - streak
  const streak = getStreak(d);
  score += Math.min(15, streak);

  // 10pts - transactions this period
  if(mTx.length>=5) score += 10;
  else score += mTx.length*2;

  return Math.min(100, Math.round(score));
}

function getScoreGrade(score){
  if(score>=90) return {grade:'S', color:'#FFD700', bg:'rgba(255,215,0,.15)'};
  if(score>=75) return {grade:'A', color:'#63d9a0', bg:'rgba(99,217,160,.15)'};
  if(score>=60) return {grade:'B', color:'#4f8eff', bg:'rgba(79,142,255,.15)'};
  if(score>=40) return {grade:'C', color:'#ffb340', bg:'rgba(255,179,64,.15)'};
  return {grade:'D', color:'#ff8080', bg:'rgba(255,95,95,.15)'};
}

function getScoreBarColor(score){
  if(score>=90) return 'linear-gradient(90deg,#FFD700,#FFA500)';
  if(score>=75) return 'linear-gradient(90deg,#63d9a0,#2d9e6b)';
  if(score>=60) return 'linear-gradient(90deg,#4f8eff,#7b5ea7)';
  if(score>=40) return 'linear-gradient(90deg,#ffb340,#ff8c00)';
  return 'linear-gradient(90deg,#ff8080,#ff4040)';
}

function getUnlockedBadges(){
  return BADGES.filter(b=>{ try{ return b.check(data); }catch(e){ return false; }});
}

function checkNewBadges(){
  const prev = JSON.parse(localStorage.getItem('budget_badges')||'[]');
  const now = getUnlockedBadges().map(b=>b.id);
  const newOnes = now.filter(id=>!prev.includes(id));
  if(newOnes.length){
    localStorage.setItem('budget_badges', JSON.stringify(now));
    newOnes.forEach(id=>{
      const b = BADGES.find(b=>b.id===id);
      if(b) setTimeout(()=>toast(`${b.emoji} Nouveau badge : ${b.name} !`), 500);
    });
  } else {
    localStorage.setItem('budget_badges', JSON.stringify(now));
  }
}

function renderGamif(){
  const cur = prefs.currency||'€';
  const score = calcScore(data);
  const grade = getScoreGrade(score);
  const streak = getStreak(data);
  const totalSav = Math.round((data.savings||[]).filter(s=>s.type==='deposit').reduce((a,b)=>a+b.amount,0));
  const unlocked = getUnlockedBadges().map(b=>b.id);
  const prev = JSON.parse(localStorage.getItem('budget_badges')||'[]');
  const isNew = id => unlocked.includes(id) && !prev.includes(id);

  // Update settings count
  const bc = document.getElementById('badgeCount');
  if(bc) bc.textContent = `${unlocked.length}/${BADGES.length} badges débloqués`;

  const el = document.getElementById('s-gamif');
  el.innerHTML = `<div class="gamif-screen-pad">

    <div class="score-card">
      <div class="score-label">Score financier</div>
      <div style="display:flex;align-items:baseline;gap:4px">
        <div class="score-number">${score}</div>
        <div class="score-max">/100</div>
      </div>
      <div class="score-bar-wrap">
        <div class="score-bar-track"><div class="score-bar-fill" style="width:${score}%;background:${getScoreBarColor(score)}"></div></div>
      </div>
      <div class="score-grade">
        <span style="color:rgba(255,255,255,.6);font-size:12px">Basé sur épargne, budgets, régularité</span>
        <span class="score-grade-badge" style="background:${grade.bg};color:${grade.color}">Rang ${grade.grade}</span>
      </div>
    </div>

    <div class="streak-row">
      <div class="streak-card">
        <div class="streak-emoji">🔥</div>
        <div class="streak-val">${streak}</div>
        <div class="streak-lbl">Jours de suite</div>
      </div>
      <div class="streak-card">
        <div class="streak-emoji">💰</div>
        <div class="streak-val">${fmtAmt(totalSav)}</div>
        <div class="streak-lbl">${cur} épargnés</div>
      </div>
      <div class="streak-card">
        <div class="streak-emoji">🏅</div>
        <div class="streak-val">${unlocked.length}</div>
        <div class="streak-lbl">Badges / ${BADGES.length}</div>
      </div>
    </div>

    <div class="sec-label">Badges & succès</div>
    <div class="badges-grid">
      ${BADGES.map(b=>{
        const ok = unlocked.includes(b.id);
        const isnew = isNew(b.id);
        return`<div class="badge-item${ok?'':' locked'}${isnew?' new-unlock':''}">
          ${isnew?'<div class="badge-new-tag">NEW</div>':''}
          <div class="badge-emoji">${b.emoji}</div>
          <div class="badge-name">${b.name}</div>
          <div class="badge-desc">${b.desc}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  // Save current unlocked
  localStorage.setItem('budget_badges', JSON.stringify(unlocked));
}

if(prefs.pinEnabled){ setTimeout(()=>showPinScreen("unlock"), 1900); }

renderDash();
</script>
